name: Import from Azure DevOps

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  import-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Azure DevOps remote and fetch
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          ADO_REPO: ${{ secrets.ADO_REPO }}
        run: |
          git remote add upstream "https://user:${ADO_PAT}@dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_git/${ADO_REPO}"
          git fetch upstream

      - name: Create import branch
        run: |
          git checkout -B import/azure-devops-upstream
          git merge upstream/main --no-edit || git merge upstream/main --allow-unrelated-histories --no-edit

      - name: Push import branch
        run: |
          git push origin import/azure-devops-upstream --force

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head import/azure-devops-upstream \
            --title "Import Azure DevOps upstream changes" \
            --body "Imports the latest Sentinel content changes from the Azure DevOps upstream repository." \
            || true
